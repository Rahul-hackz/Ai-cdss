<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Clinical Decision Support System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    :root {
      --primary: #2c6edb;
      --primary-dark: #1a4c9b;
      --danger: #e74c3c;
      --warning: #f39c12;
      --success: #2ecc71;
      --info: #3498db;
      --dark: #2c3e50;
      --bg: #f4f6f9;
      --card: #ffffff;
      --shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      --border: #dde4ed;
      --text: #2c3e50;
      --login-gradient: linear-gradient(135deg, #2c6edb, #1a4c9b);
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background-image: url("https://picsum.photos/1200/800"), linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2));
      background-size: cover;
      background-position: center;
    }
    .login-box {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .login-header {
      background: var(--login-gradient);
      color: white;
      padding: 26px 24px 20px 24px;
      text-align: center;
    }
    .login-header h1 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 600;
    }
    .login-header p {
      margin-top: 4px;
      font-size: 0.9rem;
      opacity: 0.9;
    }
    .login-body {
      padding: 24px;
    }
    label {
      display: block;
      margin: 8px 0 4px 0;
      font-weight: 500;
      color: #333;
    }
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border 0.2s;
    }
    input:focus {
      border-color: var(--primary);
      outline: none;
    }
    .btn {
      margin-top: 14px;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.97rem;
      cursor: pointer;
      font-weight: 500;
      width: 100%;
      transition: background 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover {
      background: var(--primary-dark);
    }
    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
    }
    .btn-outline:hover {
      background: rgba(44, 110, 219, 0.1);
    }
    .tabs {
      display: flex;
      gap: 12px;
      margin: 16px 0 16px 0;
      justify-content: center;
    }
    .tab {
      padding: 8px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .tab.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    form {
      margin-bottom: 16px;
    }
    .links {
      text-align: center;
      font-size: 0.9rem;
      color: #666;
    }
    .links a {
      color: var(--primary);
      text-decoration: none;
    }
    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-header">
      <h1><i class="fas fa-heartbeat"></i> AI Clinical Decision Support</h1>
      <p>Secure clinical dashboard for doctors and patients</p>
    </div>

    <div class="login-body">
      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" data-tab="doctor">Doctor / Organization</div>
        <div class="tab" data-tab="patient">Patient</div>
      </div>

      <!-- DOCTOR LOGIN -->
      <form id="doctor-login" class="login-form active" method="POST" action="/doctor">
        <label><i class="fas fa-user-md"></i> Username</label>
        <input type="text" name="username" required />

        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" name="password" required />

        <button type="submit" class="btn btn-primary">Login as Doctor</button>
      </form>

      <!-- PATIENT LOGIN -->
      <form id="patient-login" class="login-form" method="POST" action="/patient">
        <label><i class="fas fa-hospital-user"></i> Patient ID</label>
        <input type="text" name="patient_id" placeholder="e.g., P1001" required />

        <label><i class="fas fa-calendar-alt"></i> Date of Birth</label>
        <input type="date" name="dob" required />

        <button type="submit" class="btn btn-primary">Login as Patient</button>
      </form>

      <div class="links">
        <p>Need an account? <br />
          <a href="about.html" target="_blank">Learn about this project</a> or
          <a href="doctor.html" target="_blank">Register as doctor (admin only)</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const forms = document.querySelectorAll(".login-form");

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        const mode = tab.dataset.tab;
        tabs.forEach(t => t.classList.remove("active"));
        forms.forEach(f => f.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(`${mode}-login`).classList.add("active");
      });
    });
  </script>
</body>
</html>
