<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Clinical Decision Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --primary: #4a90e2;
      --primary-light: #e8f2ff;
      --danger: #e74c3c;
      --success: #2ecc71;
      --bg: #f4f6f9;
      --text: #2c3e50;
      --card: #ffffff;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px 10px;
    }
    .container {
      max-width: 480px;
      width: 100%;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 28px 24px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 8px 0;
      color: var(--primary);
      text-align: center;
    }
    p {
      margin: 0 0 16px 0;
      font-size: 0.95rem;
      text-align: center;
      color: #444;
    }
    label {
      display: block;
      margin: 12px 0 4px 0;
      font-weight: 500;
      color: #333;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.95rem;
      box-sizing: border-box;
      transition: border 0.2s;
    }
    input:focus {
      border-color: var(--primary);
      outline: none;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: #357abd;
    }
    #result {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .risk-high {
      background: #ffeaea;
      color: var(--danger);
      border: 1px solid #ffcfd2;
    }
    .risk-low {
      background: #e8f2f5;
      color: var(--success);
      border: 1px solid #cfe8f0;
    }
    .logo {
      text-align: center;
      margin-bottom: 12px;
    }
    .logo span {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span>AI Clinical Decision Support</span>
    </div>
    <div class="card">
      <h1>Disease Risk Prediction</h1>
      <p>Enter patient details below to get an AI‑powered risk assessment.</p>

      <form id="predictionForm">
        <label for="age">Age</label>
        <input type="number" id="age" name="age" required min="1" max="120" />

        <label for="bp">Blood Pressure (mmHg)</label>
        <input type="number" id="bp" name="bp" required min="70" max="220" />

        <label for="sugar">Blood Sugar (mg/dL)</label>
        <input type="number" id="sugar" name="sugar" required min="50" max="400" />

        <button type="submit">Predict Risk</button>
      </form>

      <div id="result"></div>
    </div>
  </div>

  <script>
    document.getElementById("predictionForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(e.target);
      const body = new URLSearchParams(formData);
      const resultDiv = document.getElementById("result");

      // Change this URL later to your Render backend URL
      const BACKEND_URL = "https://YOUR-FLASK-APP.onrender.com/predict";

      try {
        const response = await fetch(BACKEND_URL, {
          method: "POST",
          body,
        });

        if (!response.ok) {
          throw new Error(`Error: ${response.status}`);
        }

        const data = await response.json();

        if (data.result) {
          resultDiv.textContent = data.result;
          resultDiv.className =
            data.result.includes("High") ? "risk-high" : "risk-low";
        } else {
          resultDiv.textContent = "Unexpected response.";
          resultDiv.className = "risk-low";
        }
      } catch (err) {
        resultDiv.textContent = "Error: " + err.message;
        resultDiv.className = "risk-high";
      }
    });
  </script>
</body>
</html>
