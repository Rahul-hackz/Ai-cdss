<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Doctor Dashboard – AI Clinical Decision Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .user-menu {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
    }
    .user-menu i {
      font-size: 1.15rem;
    }

    .main-layout {
      display: flex;
      min-height: calc(100vh - 56px);
    }
    .sidebar {
      width: 240px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
    }
    .sidebar-nav {
      list-style: none;
      padding: 0;
    }
    .sidebar-nav li {
      margin: 6px 0;
    }
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--dark);
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .sidebar-nav a:hover {
      background: rgba(44, 110, 219, 0.1);
    }
    .sidebar-nav a.active {
      background: rgba(44, 110, 219, 0.2);
      color: var(--primary);
      font-weight: 500;
    }

    .content {
      flex: 1;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 20px;
      margin-bottom: 20px;
    }
    .card h2 {
      margin: 0 0 12px 0;
      font-size: 1.15rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card .badge {
      font-size: 0.8rem;
      padding: 4px 8px;
      border-radius: 6px;
      margin-left: 10px;
    }
    .badge.high {
      background: #ffeaea;
      color: var(--danger);
    }
    .badge.medium {
      background: #fff5e6;
      color: var(--warning);
    }
    .badge.low {
      background: #e8f2f5;
      color: var(--success);
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 12px 0;
    }
    .form-group {
      flex: 1;
      min-width: 140px;
    }
    label {
      display: block;
      margin: 6px 0 4px 0;
      font-weight: 500;
      color: #333;
      font-size: 0.92rem;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }
    button.btn {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.98rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
      width: 100%;
    }
    button.btn:hover {
      background: var(--primary-dark);
    }
  </style>
</head>
<body>
  <header>
    <h1><i class="fas fa-heartbeat"></i> AI Clinical Decision Support – Doctor</h1>
    <div class="user-menu">
      <span>Dr. Smith · <small>Cardiology</small></span>
      <i class="fas fa-user-md"></i>
    </div>
  </header>

  <div class="main-layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <ul class="sidebar-nav">
        <li><a href="#" class="active"><i class="fas fa-dashboard"></i> Dashboard</a></li>
        <li><a href="#"><i class="fas fa-stethoscope"></i> New Prediction</a></li>
        <li><a href="#"><i class="fas fa-file-medical"></i> Patient Reports</a></li>
        <li><a href="#"><i class="fas fa-calendar-check"></i> Appointments</a></li>
        <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="content">
      <div class="card">
        <h2><i class="fas fa-stethoscope"></i> New Disease Prediction <span class="badge low">Low workload</span></h2>
        <form id="form-global-prediction">
          <div class="form-row">
            <div class="form-group">
              <label>Patient ID</label>
              <input type="text" name="patient_id" placeholder="P1001" required />
            </div>
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" name="name" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Age</label>
              <input type="number" name="age" required min="1" max="120" />
            </div>
            <div class="form-group">
              <label>Gender</label>
              <select name="gender">
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="O">Other</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Blood Pressure</label>
              <input type="number" name="bp" required min="70" max="220" />
            </div>
            <div class="form-group">
              <label>Glucose / Cholesterol</label>
              <input type="number" name="glucose" min="50" max="400" />
            </div>
          </div>
          <button type="submit" class="btn">Predict Diseases</button>
        </form>
      </div>

      <div class="card">
        <h2><i class="fas fa-file-medical"></i> Recent Predictions</h2>
        <p>These sections will be connected to the backend API for real results.</p>
      </div>
    </div>
  </div>
</body>
</html>
